name: CI

on:
  workflow_call:
    inputs:
      skip-slack-notification:
        description: Whether to skip sending a notification to Slack.
        required: false
        default: false
        type: boolean
  pull_request:
    branches:
      - main
    paths-ignore:
      - README.md
      - LICENSE

permissions:
  contents: read

env:
  CHART_NAME: application

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: "! contains(toJSON(github.event.commits.*.message), '[skip-ci]')"
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
      - name: Helm Lint
        run: |
          helm lint ${CHART_NAME}
          helm lint ${CHART_NAME} -f ${CHART_NAME}/values-test.yaml

  checkov:
    name: Checkov
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: "! contains(toJSON(github.event.commits.*.message), '[skip-ci]')"
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@9201a8e6eaa919e3444d7c4ca691896efde4f033 # v12.3101.0
        with:
          quiet: true
          soft_fail: false
          file: ${{ env.CHART_NAME }}/Chart.yaml
          var_file: ${{ env.CHART_NAME }}/values-test.yaml

  dry-run:
    name: Install Dry Run
    runs-on: stakater-nonprod
    timeout-minutes: 10
    if: "! contains(toJSON(github.event.commits.*.message), '[skip-ci]')"
    env:
      KUBECONFIG: ${{ github.workspace }}/.kubeconfig.yaml
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
      - name: Install OpenShift CLI
        uses: redhat-actions/oc-installer@35b60c3f9757ae4301521556e1b75ff6f59f8d7c # v1
        with:
          oc_version: https://mirror.openshift.com/pub/openshift-v4/x86_64/clients/ocp/stable-4.7/openshift-client-linux.tar.gz
      - name: Login to cluster
        run: oc login --token=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token) --server=https://kubernetes.default.svc --insecure-skip-tls-verify=true
      - name: Dry Run Chart
        run: |
          helm install ${CHART_NAME} ${CHART_NAME} -f ${CHART_NAME}/values-test.yaml -n stakater-chart-pipeline-test --dry-run=server --debug

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: "! contains(toJSON(github.event.commits.*.message), '[skip-ci]')"
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: d3adb5/helm-unittest-action@850bc76597579183998069830d5fa8c3ef0ea34a # v2
        with:
          charts: application

  helm-docs:
    name: Helm Docs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: "! contains(toJSON(github.event.commits.*.message), '[skip-ci]')"
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Run helm-docs
        uses: losisin/helm-docs-github-action@6f957579ac122ecc167bf515fe84e828686c9a15 # v1.7.1
        with:
          # Keep args in sync with /.pre-commit-config.yaml
          output-file: ./../README.md
          template-files: ./README.md.gotmpl
          sort-values-order: file
      - name: Check diff
        run: |
          git diff --exit-code README.md || { echo; echo "error: README.md is out of date. Please run `make build-docs` and commit the resulting file."; exit 1; }

  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [lint, checkov, dry-run, unit-test, helm-docs]
    if: always() && ! contains(toJSON(github.event.commits.*.message), '[skip-ci]')
    steps:
      - id: workflow
        name: Compute workflow status
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            echo "status=failure" >> "$GITHUB_OUTPUT"
          else
            echo "status=success" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on PR
        uses: mshick/add-pr-comment@v2
        with:
          repo-token: ${{ secrets.STAKATER_GITHUB_TOKEN }}
          status: ${{ steps.workflow.outputs.status }}
          message-success: >-
            @${{ github.actor }} Your PR has passed the status checks.
          message-failure: >-
            @${{ github.actor }} Some status checks have failed.
          allow-repeats: false

      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        if: always() && ! inputs.skip-slack-notification
        with:
          status: ${{ steps.workflow.outputs.status }}
          fields: repo,author,action,eventName,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.STAKATER_DELIVERY_SLACK_WEBHOOK }}
