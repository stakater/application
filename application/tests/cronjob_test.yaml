suite: CronJob

templates:
  - cronjob.yaml

tests:
  - it: does not fail rendering when job image tag and digest are absent
    set:
      cronJob:
        enabled: true
        jobs:
          example:
            image:
              repository: example-image
              tag: ""
              digest: ""
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].image
          value: example-image

  - it: fails rendering when job image repository is not given
    set:
      cronJob:
        enabled: true
        jobs:
          example:
            image:
              repository: ""
              tag: doesnt
              digest: matter
    asserts:
      - failedTemplate:
          errorMessage: "Undefined image repo for container 'example'"

  - it: uses tag when defined
    set:
      cronJob:
        enabled: true
        jobs:
          example:
            image:
              repository: example-image
              tag: example-tag
              digest: ""
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].image
          value: example-image:example-tag

  - it: uses digest when defined
    set:
      cronJob:
        enabled: true
        jobs:
          example:
            image:
              repository: example-image
              tag: ""
              digest: sha256:example-digest
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].image
          value: example-image@sha256:example-digest

  - it: uses both tag and digest when given both
    set:
      cronJob:
        enabled: true
        jobs:
          example:
            image:
              repository: example-image
              tag: example-tag
              digest: sha256:example-digest
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].image
          value: example-image:example-tag@sha256:example-digest

  - it: applies the annotations correctly to the cronjob
    set:
      cronJob:
        enabled: true
        jobs:
          example:
            image:
              repository: example-image
              tag: example-tag
              digest: sha256:example-digest
            annotations:
              foo: "bar"
              bar: "baz"
    asserts:
      - equal:
          path: metadata.annotations
          value:
            foo: "bar"
            bar: "baz"

  - it: applies the additionalPodAnnotations correctly on the pods
    set:
      cronJob:
        enabled: true
        jobs:
          example:
            image:
              repository: example-image
              tag: example-tag
              digest: sha256:example-digest
            additionalPodAnnotations:
              helm.sh/hook: "pre-install,pre-upgrade"
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.metadata.annotations
          value:
            helm.sh/hook: "pre-install,pre-upgrade"

  - it: includes activeDeadlineSeconds when set to 0
    set:
      cronJob:
        enabled: true
        jobs:
          example:
            image:
              repository: example-image
              tag: example-tag
            activeDeadlineSeconds: 0
    asserts:
      - isNotNull:
          path: spec.jobTemplate.spec.activeDeadlineSeconds
      - equal:
          path: spec.jobTemplate.spec.activeDeadlineSeconds
          value: 0

  - it: includes startingDeadlineSeconds when set to 0
    set:
      cronJob:
        enabled: true
        jobs:
          example:
            image:
              repository: example-image
              tag: example-tag
            startingDeadlineSeconds: 0
    asserts:
      - isNotNull:
          path: spec.jobTemplate.spec.startingDeadlineSeconds
      - equal:
          path: spec.jobTemplate.spec.startingDeadlineSeconds
          value: 0

  - it: includes both activeDeadlineSeconds and startingDeadlineSeconds when set to 0
    set:
      cronJob:
        enabled: true
        jobs:
          example:
            image:
              repository: example-image
              tag: example-tag
            activeDeadlineSeconds: 0
            startingDeadlineSeconds: 0
    asserts:
      - isNotNull:
          path: spec.jobTemplate.spec.activeDeadlineSeconds
      - equal:
          path: spec.jobTemplate.spec.activeDeadlineSeconds
          value: 0
      - isNotNull:
          path: spec.jobTemplate.spec.startingDeadlineSeconds
      - equal:
          path: spec.jobTemplate.spec.startingDeadlineSeconds
          value: 0

  - it: includes activeDeadlineSeconds when set to positive integer
    set:
      cronJob:
        enabled: true
        jobs:
          example:
            image:
              repository: example-image
              tag: example-tag
            activeDeadlineSeconds: 300
    asserts:
      - isNotNull:
          path: spec.jobTemplate.spec.activeDeadlineSeconds
      - equal:
          path: spec.jobTemplate.spec.activeDeadlineSeconds
          value: 300

  - it: includes declared init jobs without duplicate names
    set:
      cronJob:
        enabled: true
        jobs:
          example:
            image:
              repository: example-image
              tag: example-tag
            initContainers:
              example1:
                name: shouldnotmatter
                image: example-image:example-tag
              example2:
                image: example-image:example-tag
    asserts:
      - isNotNull:
          path: spec.jobTemplate.spec.template.spec.initContainers
      - contains:
          path: spec.jobTemplate.spec.template.spec.initContainers
          content:
            name: example1
            image: example-image:example-tag
      - contains:
          path: spec.jobTemplate.spec.template.spec.initContainers
          content:
            name: example2
            image: example-image:example-tag
      - notContains:
          path: spec.jobTemplate.spec.template.spec.initContainers
          content:
            name: shouldnotmatter
            image: example-image:example-tag

  - it: includes app.kubernetes.io/name label in pod template
    set:
      cronJob:
        enabled: true
        jobs:
          example:
            image:
              repository: example-image
              tag: example-tag
      applicationName: my-app
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.metadata.labels["app.kubernetes.io/name"]
          value: my-app

  - it: includes application.stakater.com/workload-class label with value scheduled in pod template
    set:
      cronJob:
        enabled: true
        jobs:
          example:
            image:
              repository: example-image
              tag: example-tag
      applicationName: my-app
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.metadata.labels["application.stakater.com/workload-class"]
          value: scheduled

  - it: uses image templating
    set:
      custom:
        image:
          repository: custom-image
          tag: custom-tag
          digest: sha256:custom-digest
      cronJob:
        enabled: true
        jobs:
          example:
            image:
              repository: "{{ .Values.custom.image.repository }}"
              tag:  "{{ .Values.custom.image.tag }}"
              digest: "{{ .Values.custom.image.digest }}"
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].image
          value: custom-image:custom-tag@sha256:custom-digest

  - it: uses image templating (without tag)
    set:
      custom:
        image:
          repository: custom-image
          digest: sha256:custom-digest
      cronJob:
        enabled: true
        jobs:
          example:
            image:
              repository: "{{ .Values.custom.image.repository }}"
              tag:  "{{ .Values.custom.image.tag }}"
              digest: "{{ .Values.custom.image.digest }}"
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].image
          value: custom-image@sha256:custom-digest

  - it: uses image templating (without digest)
    set:
      custom:
        image:
          repository: custom-image
          tag: custom-tag
      cronJob:
        enabled: true
        jobs:
          example:
            image:
              repository: "{{ .Values.custom.image.repository }}"
              tag:  "{{ .Values.custom.image.tag }}"
              digest: "{{ .Values.custom.image.digest }}"
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].image
          value: custom-image:custom-tag

  - it: uses image templating (without tag and digest)
    set:
      custom:
        image:
          repository: custom-image
      cronJob:
        enabled: true
        jobs:
          example:
            image:
              repository: "{{ .Values.custom.image.repository }}"
              tag:  "{{ .Values.custom.image.tag }}"
              digest: "{{ .Values.custom.image.digest }}"
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].image
          value: custom-image

  - it: does not render @null when digest field is omitted
    set:
      cronJob:
        enabled: true
        jobs:
          example:
            image:
              repository: example-image
              tag: example-tag
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].image
          value: example-image:example-tag
      - notMatchRegex:
          path: spec.jobTemplate.spec.template.spec.containers[0].image
          pattern: "@null"

  - it: yields default service account name when create is disabled and no existing service account name is given
    set:
      cronJob:
        enabled: true
        jobs:
          example:
            schedule: "0 * * * *"
            image:
              repository: example-image
              tag: example-tag
      rbac.serviceAccount.create: false
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.serviceAccountName
          value: default

  - it: uses service account name override when present
    set:
      cronJob:
        enabled: true
        jobs:
          example:
            schedule: "0 * * * *"
            image:
              repository: example-image
              tag: example-tag
      rbac.serviceAccount.create: true
      rbac.serviceAccount.name: example-sa
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.serviceAccountName
          value: example-sa

  - it: uses a generated service account name when not given
    set:
      applicationName: example-app
      cronJob:
        enabled: true
        jobs:
          example:
            schedule: "0 * * * *"
            image:
              repository: example-image
              tag: example-tag
      rbac.serviceAccount.create: true
      rbac.serviceAccount.name: ""
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.serviceAccountName
          value: example-app

  - it: configures automount service account token by default
    set:
      cronJob:
        enabled: true
        jobs:
          example:
            image:
              repository: example-image
              tag: example-tag
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.automountServiceAccountToken
          value: false

  - it: enables automountServiceAccountToken when explicitly set
    set:
      cronJob:
        enabled: true
        jobs:
          example:
            automountServiceAccountToken: true
            image:
              repository: example-image
              tag: example-tag
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.automountServiceAccountToken
          value: true

  - it: does not include enable service links by default
    set:
      cronJob:
        enabled: true
        jobs:
          example:
            image:
              repository: example-image
              tag: example-tag
    asserts:
      - notExists:
          path: spec.jobTemplate.spec.template.spec.enableServiceLinks

  - it: enable service links by when configured
    set:
      cronJob:
        enabled: true
        jobs:
          example:
            enableServiceLinks: true
            image:
              repository: example-image
              tag: example-tag
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.enableServiceLinks
          value: true

  - it: disable service links when configured
    set:
      cronJob:
        enabled: true
        jobs:
          example:
            enableServiceLinks: false
            image:
              repository: example-image
              tag: example-tag
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.enableServiceLinks
          value: false

  - it: configures envFrom with chart-managed secret via nameSuffix
    set:
      cronJob:
        enabled: true
        jobs:
          example:
            schedule: "0 * * * *"
            image:
              repository: example-image
              tag: example-tag
            envFrom:
              chart-secret:
                type: secret
                nameSuffix: db-credentials
      applicationName: my-app
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].envFrom[0].secretRef.name
          value: my-app-db-credentials
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].envFrom[0].secretRef.optional
          value: false

  - it: configures envFrom with chart-managed configmap via nameSuffix
    set:
      cronJob:
        enabled: true
        jobs:
          example:
            schedule: "0 * * * *"
            image:
              repository: example-image
              tag: example-tag
            envFrom:
              chart-configmap:
                type: configmap
                nameSuffix: app-config
      applicationName: my-app
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].envFrom[0].configMapRef.name
          value: my-app-app-config
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].envFrom[0].configMapRef.optional
          value: false

  - it: configures envFrom with external secret not managed by chart
    set:
      cronJob:
        enabled: true
        jobs:
          example:
            schedule: "0 * * * *"
            image:
              repository: example-image
              tag: example-tag
            envFrom:
              external-secret:
                type: secret
                name: my-existing-secret
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].envFrom[0].secretRef.name
          value: my-existing-secret
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].envFrom[0].secretRef.optional
          value: false

  - it: configures envFrom with external configmap not managed by chart
    set:
      cronJob:
        enabled: true
        jobs:
          example:
            schedule: "0 * * * *"
            image:
              repository: example-image
              tag: example-tag
            envFrom:
              external-configmap:
                type: configmap
                name: my-existing-configmap
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].envFrom[0].configMapRef.name
          value: my-existing-configmap
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].envFrom[0].configMapRef.optional
          value: false

  - it: configures envFrom as optional when configured
    set:
      cronJob:
        enabled: true
        jobs:
          example:
            schedule: "0 * * * *"
            image:
              repository: example-image
              tag: example-tag
            envFrom:
              optional-secret:
                type: secret
                name: my-secret
                optional: true
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].envFrom[0].secretRef.name
          value: my-secret
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].envFrom[0].secretRef.optional
          value: true

  - it: supports legacy list-based envFrom (vanilla form, backward compatibility)
    set:
      cronJob:
        enabled: true
        jobs:
          example:
            schedule: "0 * * * *"
            image:
              repository: example-image
              tag: example-tag
            envFrom:
              - secretRef:
                  name: my-legacy-secret
              - configMapRef:
                  name: my-legacy-configmap
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].envFrom[0].secretRef.name
          value: my-legacy-secret
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].envFrom[1].configMapRef.name
          value: my-legacy-configmap
