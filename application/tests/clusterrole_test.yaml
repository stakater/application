suite: ClusterRole

templates:
  - clusterrole.yaml

tests:
  - it: does not render when RBAC is not enabled
    set:
      rbac:
        enabled: false
        clusterRoles: []
    asserts:
      - hasDocuments:
          count: 0

  - it: does not render when no clusterRoles are defined
    set:
      rbac:
        enabled: true
        clusterRoles: []
    asserts:
      - hasDocuments:
          count: 0

  - it: does not render when clusterRoles is not set
    set:
      rbac:
        enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: renders a basic ClusterRole with minimal configuration
    set:
      applicationName: my-app
      rbac:
        enabled: true
        clusterRoles:
          - name: example
            rules:
              - apiGroups: ["*"]
                resources: ["pods"]
                verbs: ["get", "list"]
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ClusterRole
      - equal:
          path: metadata.name
          value: my-app-cr-example
      - equal:
          path: rules[0].apiGroups[0]
          value: "*"
      - equal:
          path: rules[0].resources
          value: ["pods"]
      - equal:
          path: rules[0].verbs
          value: ["get", "list"]

  - it: renders ClusterRole with additional labels
    set:
      rbac:
        enabled: true
        additionalLabels:
          custom: label
        clusterRoles:
          - name: example
            rules:
              - apiGroups: ["*"]
                resources: ["pods"]
                verbs: ["get", "list"]
    asserts:
      - equal:
          path: metadata.labels.custom
          value: label

  - it: renders ClusterRole with annotations
    set:
      rbac:
        enabled: true
        annotations:
          custom: annotation
        clusterRoles:
          - name: example
            rules:
              - apiGroups: ["*"]
                resources: ["pods"]
                verbs: ["get", "list"]
    asserts:
      - equal:
          path: metadata.annotations.custom
          value: annotation

  - it: renders ClusterRole with multiple rules
    set:
      rbac:
        enabled: true
        clusterRoles:
          - name: example
            rules:
              - apiGroups: ["*"]
                resources: ["pods"]
                verbs: ["get", "list"]
              - apiGroups: ["apps"]
                resources: ["deployments"]
                verbs: ["create", "update"]
    asserts:
      - equal:
          path: rules[1].apiGroups[0]
          value: "apps"
      - equal:
          path: rules[1].resources[0]
          value: "deployments"
      - equal:
          path: rules[1].verbs[0]
          value: "create"

  - it: renders multiple ClusterRoles
    set:
      applicationName: my-app
      rbac:
        enabled: true
        clusterRoles:
          - name: role1
            rules:
              - apiGroups: ["*"]
                resources: ["pods"]
                verbs: ["get"]
          - name: role2
            rules:
              - apiGroups: ["apps"]
                resources: ["deployments"]
                verbs: ["create"]
    asserts:
      - hasDocuments:
          count: 2

  - it: does not have a namespace field
    set:
      rbac:
        enabled: true
        clusterRoles:
          - name: example
            rules:
              - apiGroups: ["*"]
                resources: ["pods"]
                verbs: ["get", "list"]
    asserts:
      - notExists:
          path: metadata.namespace
