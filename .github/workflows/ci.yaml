name: CI

on:
  workflow_call: {}

  pull_request:
    branches:
      - main
    paths-ignore:
      - README.md
      - LICENSE

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CHART_PATH: application
  RELEASE_NAME: application
  TEST_NAMESPACE: application-test

jobs:
  lint:
    name: Helm lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Helm lint
        run: helm lint "$CHART_PATH"

  unittest:
    name: Helm unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Install helm-unittest
        run: helm plugin install https://github.com/helm-unittest/helm-unittest.git

      - name: Run helm-unittest
        run: helm unittest "$CHART_PATH"

  render:
    name: Helm render
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        values:
          - ""
          - application/values-test.yaml
          - application/ci/values-kind.yaml
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Render chart
        shell: bash
        run: |
          set -euo pipefail

          args=()
          case "${{ matrix.values }}" in
            "")
              args+=(
                "--set" "deployment.image.repository=nginx"
                "--set" "deployment.image.tag=1.25"
              )
              ;;
            "application/values-test.yaml")
              args+=("-f" "${{ matrix.values }}")
              api_versions=(
                "autoscaling.k8s.io/v1/VerticalPodAutoscaler"
                "gateway.networking.k8s.io/v1"
                "external-secrets.io/v1/ExternalSecret"
                "cert-manager.io/v1"
                "bitnami.com/v1alpha1"
                "monitoring.coreos.com/v1"
                "monitoring.coreos.com/v1alpha1"
                "secrets-store.csi.x-k8s.io/v1alpha1"
                "forecastle.stakater.com/v1alpha1"
                "endpointmonitor.stakater.com/v1alpha1"
                "route.openshift.io/v1"
                "velero.io/v1"
              )
              for api_version in "${api_versions[@]}"; do
                args+=("--api-versions" "$api_version")
              done
              ;;
            *)
              args+=("-f" "${{ matrix.values }}")
              ;;
          esac

          helm template "$RELEASE_NAME" "$CHART_PATH" \
            "${args[@]}" \
            --namespace "$TEST_NAMESPACE" \
            --debug > rendered.yaml

          test -s rendered.yaml

  checkov:
    name: Checkov security scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@9201a8e6eaa919e3444d7c4ca691896efde4f033 # v12.3101.0
        with:
          quiet: true
          soft_fail: false
          file: ${{ env.CHART_PATH }}/Chart.yaml
          var_file: ${{ env.CHART_PATH }}/values-test.yaml

  helm-docs:
    name: Helm docs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Run helm-docs
        uses: losisin/helm-docs-github-action@6f957579ac122ecc167bf515fe84e828686c9a15 # v1.7.1
        with:
          output-file: ./../README.md
          template-files: ./README.md.gotmpl
          sort-values-order: file

      - name: Check diff
        run: |
          git diff --exit-code README.md || { echo; echo "error: README.md is out of date. Please run 'make build-docs' and commit the resulting file."; exit 1; }

  kind-api-validation:
    name: Kind API validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        kubernetes:
          - v1.29.10
          - v1.30.6
          - v1.31.2
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          node_image: kindest/node:${{ matrix.kubernetes }}

      - name: Render Kubernetes-compatible chart
        run: |
          helm template "$RELEASE_NAME" "$CHART_PATH" \
            -f application/ci/values-kind.yaml \
            --namespace "$TEST_NAMESPACE" \
            --debug > rendered.yaml

      - name: Server-side API validation
        run: |
          kubectl create namespace "$TEST_NAMESPACE"
          kubectl apply \
            --namespace "$TEST_NAMESPACE" \
            --dry-run=server \
            -f rendered.yaml
