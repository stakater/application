route:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: external-ingress
    ingress.kubernetes.io/rewrite-target: /
    ingress.kubernetes.io/force-ssl-redirect: "true"
  additionalLabels:
    key: value
  path: /document
  port:
    targetPort: http
  to:
    weight: 80
  wildcardPolicy: None
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  alternateBackends:
    kind: Service
    name: alternate-application
    weight: 20

sealedSecret:
  enabled: true
  files:
    example:
      encryptedData:
        name: 
      annotations:
        key: value
      labels:
        key: value
      type: Opaque
      clusterWide: true

externalSecret:
  enabled: true
  secretStore:
    name: example-secret-store
  refreshInterval: "1m"
  files:
    secret-1-name:
      data:
        example-secret-key:
          remoteRef:
            key: example-provider-key
            property: example-provider-key-property
    secret-2-name:
      dataFrom:
        key: example-provider-key
      type: Opaque
      annotations:
        key: value
      labels:
        key: value

