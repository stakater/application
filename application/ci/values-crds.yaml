endpointMonitor:
  enabled: true
  additionalLabels:
    key: value

forecastle:
  enabled: true
  additionalLabels:
    key: value
  icon: https://raw.githubusercontent.com/stakater/ForecastleIcons/master/stakater-big.png
  displayName: application
  group: ""
  networkRestricted: false

serviceMonitor:
  enabled: true
  additionalLabels:
    key: value
  endpoints:
    - interval: 5s
      path: /actuator/prometheus
      port: http

alertmanagerConfig:
  enabled: true
  selectionLabels:
    alertmanagerConfig: workload
  spec:
    route:
      receiver: "null"
      groupBy:
        - job
      routes:
        - receiver: "null"
          groupBy:
            - alertname
            - severity
          continue: true
      groupWait: 30s
      groupInterval: 5m
      repeatInterval: 12h
    receivers:
      - name: "null"
    inhibitRules:
      - sourceMatch:
          - name: severity
            value: critical
        targetMatch:
          - name: severity
            value: warning
        equal: ["cluster", "service"]

prometheusRule:
  enabled: true
  additionalLabels:
    prometheus: stakater-workload-monitoring
    role: alert-rules
  groups:
    - name: example-app-uptime
      rules:
        - alert: ExampleAppDown
          annotations:
            message: >-
              The Example App is Down (Test Alert)
          expr: up{namespace="test-app"} == 0
          for: 1m
          labels:
            severity: critical

certificate:
  enabled: true
  additionalLabels:
    key: value
  secretName: tls-cert
  duration: 8760h0m0s
  renewBefore: 720h0m0s
  commonName: admin-app
  keyAlgorithm: RSA
  keyEncoding: PKCS1
  keySize: 2048
  isCA: false
  privateKey:
    enabled: true
    rotationPolicy: Always
  issuerRef:
    name: ca-issuer
    kind: ClusterIssuer
    group:
  keystores:
    enabled: true
    pkcs12:
      create: true
      key: test_key
      name: test-creds
    jks:
      create: false
      key: test_key
      name: test-creds

secretProviderClass:
  enabled: true
  name: mongo-host
  provider: vault
  vaultAddress: "http://vault:8200"
  roleName: '{{ .Release.Name }}'
  objects: |
    - objectName: "MONGO_HOST"
      secretPath: "testing/data/mongoDb"
      secretKey: "MONGO_HOST"
  secretObjects:
    - data:
        - key: MONGO_HOST
          objectName: host
      secretName: secret-mongo-host
      type: Opaque

vpa:
  enabled: true
  containerPolicies:
    - containerName: "*"
      minAllowed:
        cpu: 0.5
        memory: 1Gi
      maxAllowed:
        cpu: 1
        memory: 5Gi

backup:
  namespace: openshift-adp
  enabled: true
  snapshotVolumes: true
  storageLocation: dpa-1
  ttl: 1h0m0s
  includedResources:
    - deployments
    - services
    - persistentvolumeclaims
    - secrets
    - configmaps
  excludedResources:
    - daemonsets
    - statefulsets
    - nodes
    - apiservices
    - events
    - resourcequotas
    - controllerrevisions.apps

httpRoute:
  enabled: false
  parentRefs:
    - name: example-gateway
  hostnames:
    - www.example.com
