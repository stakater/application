name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
      - LICENSE

  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to create a GitHub release for (e.g. v1.2.3)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CHART_PATH: application
  OCI_REGISTRY: ghcr.io/stakater/charts
  GIT_USER_NAME: stakater-user
  GIT_USER_EMAIL: stakater@gmail.com

jobs:
  ci:
    name: CI
    if: ${{ github.event_name != 'workflow_dispatch' && !contains(github.event.head_commit.message, '[skip-ci]') }}
    uses: ./.github/workflows/ci.yaml
    secrets: inherit

  bump-version:
    name: Bump chart version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - ci
    if: ${{ github.event_name != 'workflow_dispatch' && !contains(github.event.head_commit.message, '[skip-ci]') && vars.RELEASE_CIRCUIT_BREAKER == 'false' }}
    outputs:
      version: ${{ steps.get-next-version.outputs.version }}
      has-next-version: ${{ steps.get-next-version.outputs.hasNextVersion }}
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Generate next version
        id: get-next-version
        uses: thenativeweb/get-next-version@0cfafef003741641ee52a2a37fdfc27ce5e857f5 # 2.7.2

      - name: Show next version
        run: |
          echo "Has next version: ${{ steps.get-next-version.outputs.hasNextVersion }}"
          echo "Next version: ${{ steps.get-next-version.outputs.version }}"

      - name: Update chart version
        if: ${{ steps.get-next-version.outputs.hasNextVersion == 'true' }}
        env:
          VERSION: ${{ steps.get-next-version.outputs.version }}
        run: ./hack/set-version.sh "$VERSION"

      - name: Upload bumped chart metadata
        if: ${{ steps.get-next-version.outputs.hasNextVersion == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bumped-chart
          path: application/Chart.yaml
          if-no-files-found: error

  publish:
    name: Publish chart
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      packages: write
      id-token: write
    needs:
      - bump-version
    if: ${{ needs.bump-version.outputs.has-next-version == 'true' }}
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download bumped chart metadata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bumped-chart
          path: application

      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Helm chart to OCI registry
        id: push-chart
        run: |
          helm package ./${{ env.CHART_PATH }} --destination ./packaged-chart
          push_output=$(helm push ./packaged-chart/*.tgz oci://${{ env.OCI_REGISTRY }} 2>&1)
          echo "$push_output"
          digest=$(echo "$push_output" | awk '/Digest:/{print $2}')
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Sign OCI artifact with Cosign
        run: cosign sign --yes ${{ env.OCI_REGISTRY }}/${{ env.CHART_PATH }}@${{ steps.push-chart.outputs.digest }}

      - name: Publish Helm chart to GitHub Pages
        uses: step-security/helm-gh-pages@3a91c620f61e0120377cfd94e19f04292ddd8e67 # v1.7.8
        with:
          branch: master
          repository: stakater-charts
          target_dir: docs
          token: ${{ secrets.PUBLISH_TOKEN }}
          charts_dir: .
          charts_url: https://stakater.github.io/stakater-charts
          owner: stakater
          linting: off
          commit_username: ${{ env.GIT_USER_NAME }}
          commit_email: ${{ env.GIT_USER_EMAIL }}

  push-version:
    name: Push bumped version and tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - bump-version
      - publish
    if: ${{ needs.bump-version.outputs.has-next-version == 'true' }}
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download bumped chart metadata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bumped-chart
          path: application

      - name: Commit bumped Chart.yaml
        id: commit
        run: |
          set -euo pipefail
          git config --local user.email "$GIT_USER_EMAIL"
          git config --local user.name "$GIT_USER_NAME"
          git add application/Chart.yaml
          git commit -m "chore(chart): bump version to ${{ needs.bump-version.outputs.version }} [skip-ci]"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Push bumped Chart.yaml
        uses: ad-m/github-push-action@881a6320fdb16eb5318c5054f31c218aec2b324c # v1.3.0
        with:
          github_token: ${{ secrets.PUBLISH_TOKEN }}
          branch: main

      - name: Push release tag
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ secrets.PUBLISH_TOKEN }}
          script: |
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'refs/tags/v${{ needs.bump-version.outputs.version }}',
              sha: '${{ steps.commit.outputs.sha }}'
            })

  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    needs:
      - bump-version
      - publish
      - push-version
    if: ${{ always() && (needs.push-version.result == 'success' || github.event_name == 'workflow_dispatch') }}
    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || format('v{0}', needs.bump-version.outputs.version) }}
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || format('v{0}', needs.bump-version.outputs.version) }}
          generate_release_notes: true
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - ci
      - bump-version
      - publish
      - push-version
      - create-release
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip-ci]')) }}
    steps:
      - id: workflow
        name: Compute workflow status
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            echo "status=failure" >> "$GITHUB_OUTPUT"
          else
            echo "status=success" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Slack
        uses: 8398a7/action-slack@77eaa4f1c608a7d68b38af4e3f739dcd8cba273e # v3.19.0
        if: ${{ always() }}
        with:
          status: ${{ steps.workflow.outputs.status }}
          fields: repo,author,action,eventName,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.STAKATER_DELIVERY_SLACK_WEBHOOK }}
